<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majhim AI Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b141a; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header { background: #202c33; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .status-dot { height: 10px; width: 10px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        .msg { display: flex; margin-bottom: 12px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; position: relative; line-height: 1.4; }
        .user { justify-content: flex-end; }
        .user .bubble { background: #005c4b; color: #e9edef; border-top-right-radius: 0; }
        .bot { justify-content: flex-start; }
        .bot .bubble { background: #202c33; color: #e9edef; border-top-left-radius: 0; }

        /* Input Area */
        .input-area { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 20px; color: white; outline: none; }
        button { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; font-size: 20px; }
        
        .typing { font-size: 12px; color: #00a884; margin-left: 15px; display: none; }
        img { border-radius: 8px; margin-top: 5px; max-width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div><b>Majhim AI</b> <span class="typing" id="typing-ui">typing...</span></div>
        <div id="auth-buttons">
            <button style="width: auto; height: auto; padding: 5px 10px; border-radius: 5px; font-size: 12px;" onclick="login()">Login</button>
        </div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message or /image...">
        <button onclick="sendMsg()">➔</button>
    </div>

    <script>
        // 1. Firebase Configuration (यहाँ अपना डेटा डालें)
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const openAIKey = "YOUR_OPENAI_API_KEY";

        const chatBox = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        // 2. Send Message Logic
        async function sendMsg() {
            const text = userInput.value.trim();
            if (!text) return;

            addBubble(text, 'user');
            userInput.value = '';
            
            if (text.startsWith("/image ")) {
                generateAIImage(text.replace("/image ", ""));
            } else {
                callChatGPT(text);
            }
        }

        function addBubble(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 3. AI Calls
        async function callChatGPT(query) {
            document.getElementById('typing-ui').style.display = 'inline';
            try {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAIKey}` },
                    body: JSON.stringify({ model: "gpt-3.5-turbo", messages: [{role: "user", content: query}] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                addBubble(reply, 'bot');
                speak(reply); // Voice reply
            } catch (e) { addBubble("Error connecting to AI", 'bot'); }
            document.getElementById('typing-ui').style.display = 'none';
        }

        async function generateAIImage(prompt) {
            addBubble("Generating image...", 'bot');
            try {
                const res = await fetch('https://api.openai.com/v1/images/generations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAIKey}` },
                    body: JSON.stringify({ prompt: prompt, n: 1, size: "256x256" }) // Smaller size for old phones
                });
                const data = await res.json();
                addBubble(`<img src="${data.data[0].url}">`, 'bot');
            } catch (e) { addBubble("Image generation failed", 'bot'); }
        }

        // 4. Voice Function
        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'hi-IN'; // Hindi Support
            window.speechSynthesis.speak(speech);
        }

        // 5. Auth Placeholder
        function login() {
            alert("Firebase Login Triggered! (Setup your keys first)");
        }
    </script>
</body>
</html>
