<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majhim AI Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-remote-config-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: #202c33; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .header b { color: #00a884; font-size: 18px; }

        #chat-container { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }

        .msg { display: flex; margin-bottom: 15px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        .bubble { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .user { justify-content: flex-end; }
        .user .bubble { background: #005c4b; color: white; border-top-right-radius: 0; }
        .bot { justify-content: flex-start; }
        .bot .bubble { background: #202c33; color: #e9edef; border-top-left-radius: 0; }

        pre { background: #1a1a1a !important; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; border: 1px solid #333; }
        
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
        
        /* Selection & Highlight Fix for Chrome/Via */
        .action-btn, .round-btn { 
            font-size: 11px; color: #00a884; cursor: pointer; font-weight: bold; text-transform: uppercase;
            -webkit-user-select: none; user-select: none; 
            -webkit-tap-highlight-color: transparent; outline: none;
        }

        .input-area { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: white; outline: none; }
        
        .round-btn { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #mic-btn { background: #3b4a54; transition: 0.3s; }
        
        .typing { font-size: 12px; color: #00a884; display: none; margin-left: 10px; }
        img { border-radius: 10px; margin-top: 8px; max-width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div><b>Majhim AI Pro</b> <span class="typing" id="typing-ui">typing...</span></div>
        <button style="background:transparent; border:1px solid #00a884; color:#00a884; padding:4px 10px; border-radius:15px; font-size:12px;">Login</button>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <button class="round-btn" id="mic-btn" onclick="startVoiceTyping()">🎤</button>
        <input type="text" id="user-input" placeholder="Type or speak...">
        <button class="round-btn" onclick="sendMsg()">➔</button>
    </div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCL4YKtPYxxhLoGwjw7A_81WWYBsOQZmoQ",
        authDomain: "majhim-ai.firebaseapp.com",
        projectId: "majhim-ai",
        storageBucket: "majhim-ai.firebasestorage.app",
        messagingSenderId: "361749678090",
        appId: "1:361749678090:web:ed1668151fbe935fecb7f3"
    };
    firebase.initializeApp(firebaseConfig);
    const remoteConfig = firebase.remoteConfig();
    remoteConfig.settings.minimumFetchIntervalMillis = 0;

    async function getAIKey() {
        try { await remoteConfig.fetchAndActivate(); return remoteConfig.getValue('OPENAI_API_KEY').asString(); } catch (err) { return null; }
    }

    const chatBox = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');

    // 2. Hybrid Voice Recognition (Append Logic)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    function startVoiceTyping() {
        if (!recognition) { alert("Voice typing not supported."); return; }
        let oldText = userInput.value.trim();
        recognition.lang = 'hi-IN';
        recognition.start();
        document.getElementById('mic-btn').style.background = "#ea0038";
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = oldText !== "" ? oldText + " " + transcript : transcript;
            document.getElementById('mic-btn').style.background = "#3b4a54";
        };
        recognition.onspeechend = () => { recognition.stop(); document.getElementById('mic-btn').style.background = "#3b4a54"; };
        recognition.onerror = () => { document.getElementById('mic-btn').style.background = "#3b4a54"; };
    }

    // 3. UI and Logic
    async function sendMsg() {
        const text = userInput.value.trim();
        if (!text) return;
        addBubble(text, 'user');
        userInput.value = '';
        if (text.startsWith("/image ")) generateAIImage(text.replace("/image ", ""));
        else callChatGPT(text);
    }

    function addBubble(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        let content = text;
        if (sender === 'bot') {
            content = text.replace(/```(\w+)?([\s\S]*?)```/g, (m, lang, code) => `<pre><code class="language-${lang || 'javascript'}">${code.trim()}</code></pre>`);
        }
        const buttons = sender === 'bot' ? `
            <div class="btn-group">
                <span class="action-btn" onclick="speakFromBubble(this)">Listen 🔊</span>
                <span class="action-btn" onclick="copyToClipboard(this)">Copy Text</span>
            </div>` : '';
        div.innerHTML = `<div class="bubble"><div class="text-content">${content}</div>${buttons}</div>`;
        chatBox.appendChild(div);
        if (sender === 'bot') Prism.highlightAllUnder(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function callChatGPT(query) {
        document.getElementById('typing-ui').style.display = 'inline';
        const key = await getAIKey();
        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role: "user", content: query}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            addBubble(reply, 'bot');
            speakText(reply);
        } catch (e) { console.error(e); }
        document.getElementById('typing-ui').style.display = 'none';
    }

    async function generateAIImage(prompt) {
        addBubble("🎨 Drawing...", 'bot');
        const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=512&height=512&seed=${Math.random()}`;
        addBubble(`<img src="${url}">`, 'bot');
    }

    // 4. CLOUD TTS & BACKUP SYSTEM TTS
    let currentAudio = null;

    function speakFromBubble(btn) {
        const text = btn.closest('.bubble').querySelector('.text-content').innerText;
        speakText(text);
    }

    function speakText(text) {
        // पुराने ऑडियो को रोकें
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        window.speechSynthesis.cancel();

        // कोड हटाकर साफ़ टेक्स्ट (Cloud API लिमिट 200 शब्द)
        const cleanText = text.replace(/```[\s\S]*?```/g, "Code Block").substring(0, 250);
        
        // Google Translate Cloud TTS URL
        const voiceUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(cleanText)}&tl=hi&client=tw-ob`;

        currentAudio = new Audio(voiceUrl);
        currentAudio.play().catch(e => {
            console.log("Cloud TTS Failed, using System TTS...");
            fallbackToSystemTTS(cleanText);
        });
    }

    function fallbackToSystemTTS(text) {
        const s = new SpeechSynthesisUtterance(text);
        s.lang = 'hi-IN';
        window.speechSynthesis.resume();
        window.speechSynthesis.speak(s);
    }

    // 5. COPY LOGIC
    function copyToClipboard(btn) {
        const text = btn.closest('.bubble').querySelector('.text-content').innerText;
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => showStatus(btn, "COPIED ✅")).catch(() => fallbackCopy(text, btn));
        } else { fallbackCopy(text, btn); }
    }

    function fallbackCopy(text, btn) {
        const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        showStatus(btn, "COPIED ✅");
    }

    function showStatus(btn, msg) {
        const old = btn.innerText; btn.innerText = msg;
        setTimeout(() => btn.innerText = old, 2000);
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
        </html>
