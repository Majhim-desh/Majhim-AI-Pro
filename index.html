<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majhim AI Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-remote-config-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="code-block">
    
    <button onclick="copyCode(this)">Copy Code 💻</button>
    
    <pre><code>
console.log("Hello Majhim 🔥");
    </code></pre>

</div>
    
    <div class="header">
    <div>
        <b>Majhim AI Pro</b> 
        <span class="typing" id="typing-ui" style="display:none;">typing...</span>
    </div>

    <div id="auth-section">
        <button id="login-btn" onclick="login()" style="background:transparent; border:1px solid #00a884; color:#00a884; padding:4px 10px; border-radius:15px; font-size:12px; cursor:pointer;">Login</button>
        
        <div id="user-profile" style="display:none; align-items:center; gap:8px;">
            <span id="user-name" style="font-size:12px; color:#00a884; font-weight:bold;"></span>
            <button onclick="logout()" style="background:transparent; border:none; color:#ff4444; font-size:10px; cursor:pointer;">Logout</button>
        </div>
    </div>
</div>

    <div id="chat-container"></div>

    <div class="input-area">
        <button class="round-btn" id="mic-btn" onclick="startVoiceTyping()">🎤</button>
        <input type="text" id="user-input" placeholder="Type or speak...">
        <button class="round-btn" onclick="sendMsg()">➔</button>
    </div>

    <script src="firebase-init.js"></script>
    <script src="ai-logic.js"></script>
    <script src="voice-utils.js"></script>
    
</body>
</html>
